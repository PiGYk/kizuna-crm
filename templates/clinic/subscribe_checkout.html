<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата — Kizuna CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { dark: '#12100F', gold: '#DEAA01' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-brand-dark min-h-screen flex items-center justify-center px-4">
  <div class="text-center text-white">
    <div class="animate-spin rounded-full h-10 w-10 border-2 border-brand-gold border-t-transparent mx-auto mb-6"></div>
    <p class="text-lg font-semibold mb-1">Переходимо до оплати…</p>
    <p class="text-gray-400 text-sm">Тариф «{{ plan.label }}» — ₴{{ plan.price }}/міс</p>
  </div>

  <form id="wfp-form" method="POST" action="{{ wayforpay_url }}">
    {% for name, value in fields.items %}
    <input type="hidden" name="{{ name }}" value="{{ value }}">
    {% endfor %}
  </form>

  <script>
    document.getElementById('wfp-form').submit();
  </script>
</body>
</html>
