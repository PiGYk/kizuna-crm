{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата успішна — Kizuna CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { dark: '#12100F', gold: '#DEAA01' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JDBP6T5SSC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JDBP6T5SSC');
    gtag('event', 'purchase', {
      currency: 'UAH',
      value: {{ amount|default:0 }},
      transaction_id: '{{ order_ref|default:"" }}',
      items: [{ item_name: '{{ plan_name|default:"Тариф" }}', quantity: 1, price: {{ amount|default:0 }} }]
    });
  </script>
</head>
<body class="bg-brand-dark min-h-screen flex items-center justify-center px-4">
  <div class="max-w-sm w-full text-center">
    <div class="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white mb-3">Оплата успішна!</h1>
    <p class="text-gray-400 mb-8">
      Доступ до Kizuna CRM подовжено на 30 днів.<br>
      Дякуємо за довіру!
    </p>
    <a href="/dashboard/"
       class="inline-block bg-brand-gold text-brand-dark font-bold px-8 py-3 rounded-xl hover:opacity-90 transition">
      Перейти до CRM →
    </a>
    <div class="mt-6">
      <p class="text-gray-500 text-xs">
        Питання? <a href="mailto:hello@kizuna.com.ua" class="text-brand-gold hover:underline">hello@kizuna.com.ua</a>
        або <a href="tel:+380682398095" class="text-brand-gold hover:underline">+38 068 239 80 95</a>
      </p>
    </div>
  </div>
</body>
</html>
