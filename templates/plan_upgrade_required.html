{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Потрібен вищий тариф — Kizuna CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{dark:'#12100F',gold:'#DEAA01'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="max-w-sm w-full text-center">

    <div class="w-16 h-16 rounded-full bg-brand-gold/15 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">Потрібен вищий тариф</h1>
    <p class="text-gray-500 mb-2">
      Функція <strong>{{ feature }}</strong> доступна з тарифу
      <strong class="text-brand-gold">{{ required_plan }}</strong>.
    </p>
    <p class="text-gray-400 text-sm mb-8">
      Перейдіть на вищий тариф або зверніться до нас — підключимо одразу.
    </p>

    <div class="space-y-3">
      <a href="/#pricing"
         class="block w-full py-3 bg-brand-gold text-brand-dark font-bold rounded-xl hover:opacity-90 transition">
        Переглянути тарифи →
      </a>
      <a href="tel:+380682398095"
         class="block w-full py-3 border border-gray-200 text-gray-600 rounded-xl text-sm hover:border-brand-gold hover:text-brand-gold transition">
        +38 068 239 80 95
      </a>
    </div>

    <div class="mt-6">
      <a href="javascript:history.back()" class="text-gray-400 text-sm hover:text-gray-600">← Назад</a>
    </div>

  </div>
</body>
</html>
