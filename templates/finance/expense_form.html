{% extends "base.html" %}
{% block title %}{{ title }} — Kizuna CRM{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold mb-6">{{ title }}</h1>

  <form method="post" enctype="multipart/form-data" class="bg-white rounded-xl p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
    {% endfor %}

    <div class="flex gap-3 pt-4">
      <button type="submit" class="px-6 py-2.5 rounded-lg text-sm font-medium bg-brand-gold text-brand-dark hover:opacity-90">Зберегти</button>
      <a href="{% url 'finance:expenses' %}" class="px-6 py-2.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Скасувати</a>
    </div>
  </form>
</div>
{% endblock %}
