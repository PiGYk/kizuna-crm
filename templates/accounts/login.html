{% extends 'base.html' %}

{% block title %}Вхід — Kizuna CRM{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-indigo-600">Kizuna CRM</h1>
      <p class="text-gray-500 mt-1 text-sm">Ветеринарна система управління</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if form.errors %}
          <div class="bg-red-50 text-red-700 text-sm px-4 py-3 rounded-lg">
            Невірний логін або пароль
          </div>
        {% endif %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Логін</label>
          <input type="text" name="username" autofocus required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
          <input type="password" name="password" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
          Увійти
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
