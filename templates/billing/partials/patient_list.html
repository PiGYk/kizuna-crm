<h2 class="text-sm font-semibold text-gray-700 mb-3">Пацієнт <span class="text-gray-400 font-normal">(необов'язково)</span></h2>
<div class="flex flex-wrap gap-2">
  {% for patient in patients %}
  <button type="button" id="patient-{{ patient.pk }}"
    onclick="selectPatient({{ patient.pk }})"
    class="patient-btn px-3 py-2 rounded-lg border border-gray-200 text-sm hover:border-brand-gold transition text-left">
    <div class="font-medium text-brand-dark">{{ patient.name }}</div>
    <div class="text-xs text-gray-400">{{ patient.get_species_display }}</div>
  </button>
  {% empty %}
  <p class="text-sm text-gray-400">У цього клієнта немає пацієнтів</p>
  {% endfor %}
</div>
