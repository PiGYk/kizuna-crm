{% extends 'base.html' %}

{% block title %}Новий чек — Kizuna CRM{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'billing:list' %}" class="text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-2xl font-bold text-brand-dark">Новий чек</h1>
  </div>

  <!-- Step 1: пошук клієнта або пацієнта -->
  <div class="bg-white rounded-xl border border-gray-200 p-6 mb-4">

    <!-- Табики -->
    <div class="flex gap-1 mb-4 bg-gray-100 rounded-lg p-1">
      <button type="button" id="tab-client"
        onclick="switchTab('client')"
        class="tab-btn flex-1 py-1.5 rounded-md text-sm font-medium transition bg-white text-brand-dark shadow-sm">
        За клієнтом
      </button>
      <button type="button" id="tab-patient"
        onclick="switchTab('patient')"
        class="tab-btn flex-1 py-1.5 rounded-md text-sm font-medium transition text-gray-500 hover:text-gray-700">
        За твариною
      </button>
    </div>

    <!-- Пошук за клієнтом -->
    <div id="search-client">
      <input
        type="text"
        placeholder="Пошук за прізвищем або телефоном…"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-gold"
        hx-get="{% url 'billing:client_search' %}"
        hx-trigger="input changed delay:300ms"
        hx-target="#client-results"
        name="q"
      >
      <div id="client-results" class="mt-2"></div>
    </div>

    <!-- Пошук за твариною -->
    <div id="search-patient" class="hidden">
      <input
        type="text"
        placeholder="Кличка або порода…"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-gold"
        hx-get="{% url 'billing:patient_search' %}"
        hx-trigger="input changed delay:300ms"
        hx-target="#patient-search-results"
        name="q"
      >
      <div id="patient-search-results" class="mt-2"></div>
    </div>
  </div>

  <!-- Обраний пацієнт (при пошуку за твариною) -->
  <div id="selected-patient-card" class="hidden bg-white rounded-xl border border-brand-gold p-4 mb-4">
    <div class="flex items-center gap-3">
      <div id="selected-patient-photo" class="w-12 h-12 rounded-full overflow-hidden flex-shrink-0 bg-gray-100 flex items-center justify-center text-xl"></div>
      <div>
        <div class="font-semibold text-brand-dark text-sm" id="selected-patient-name"></div>
        <div class="text-xs text-gray-400" id="selected-patient-owner"></div>
      </div>
      <button type="button" onclick="clearSelection()" class="ml-auto text-gray-300 hover:text-gray-500 text-xs">✕</button>
    </div>
  </div>

  <!-- Step 2: пацієнт (заповнюється після вибору клієнта) -->
  <div id="patient-section" class="hidden bg-white rounded-xl border border-gray-200 p-6 mb-4"></div>

  <!-- Step 3: форма створення -->
  <form method="post" id="start-form">
    {% csrf_token %}
    <input type="hidden" name="client_id" id="selected-client-id">
    <input type="hidden" name="patient_id" id="selected-patient-id">
    <button type="submit" id="start-btn"
      class="hidden w-full bg-brand-gold text-brand-dark py-2.5 rounded-lg text-sm font-semibold hover:brightness-95">
      Перейти до чеку →
    </button>
  </form>
</div>

<script>
function switchTab(tab) {
  const isClient = tab === 'client';
  document.getElementById('search-client').classList.toggle('hidden', !isClient);
  document.getElementById('search-patient').classList.toggle('hidden', isClient);

  document.getElementById('tab-client').className = isClient
    ? 'tab-btn flex-1 py-1.5 rounded-md text-sm font-medium transition bg-white text-brand-dark shadow-sm'
    : 'tab-btn flex-1 py-1.5 rounded-md text-sm font-medium transition text-gray-500 hover:text-gray-700';
  document.getElementById('tab-patient').className = isClient
    ? 'tab-btn flex-1 py-1.5 rounded-md text-sm font-medium transition text-gray-500 hover:text-gray-700'
    : 'tab-btn flex-1 py-1.5 rounded-md text-sm font-medium transition bg-white text-brand-dark shadow-sm';

  clearSelection();
  document.getElementById('client-results').innerHTML = '';
  document.getElementById('patient-search-results').innerHTML = '';
  document.getElementById('patient-section').classList.add('hidden');
}

function selectClient(id, name) {
  document.getElementById('selected-client-id').value = id;
  document.getElementById('selected-patient-id').value = '';
  document.getElementById('start-btn').classList.remove('hidden');

  htmx.ajax('GET', '/billing/patients/' + id + '/', {target: '#patient-section', swap: 'innerHTML'});
  document.getElementById('patient-section').classList.remove('hidden');
  document.getElementById('selected-patient-card').classList.add('hidden');
}

function selectPatient(id) {
  document.getElementById('selected-patient-id').value = id;
  document.querySelectorAll('.patient-btn').forEach(b => b.classList.remove('ring-2', 'ring-brand-gold'));
  document.getElementById('patient-' + id)?.classList.add('ring-2', 'ring-brand-gold');
}

function selectPatientDirect(patientId, clientId, patientName, clientName) {
  document.getElementById('selected-patient-id').value = patientId;
  document.getElementById('selected-client-id').value = clientId;
  document.getElementById('start-btn').classList.remove('hidden');
  document.getElementById('patient-section').classList.add('hidden');
  document.getElementById('patient-search-results').innerHTML = '';

  // показати картку обраного пацієнта
  document.getElementById('selected-patient-name').textContent = patientName;
  document.getElementById('selected-patient-owner').textContent = clientName;
  document.getElementById('selected-patient-card').classList.remove('hidden');
}

function clearSelection() {
  document.getElementById('selected-client-id').value = '';
  document.getElementById('selected-patient-id').value = '';
  document.getElementById('start-btn').classList.add('hidden');
  document.getElementById('selected-patient-card').classList.add('hidden');
  document.getElementById('patient-section').classList.add('hidden');
}
</script>
{% endblock %}
