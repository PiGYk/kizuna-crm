{% if clients %}
  {% for client in clients %}
  <div class="px-4 py-3 hover:bg-indigo-50 cursor-pointer border-b border-gray-100 last:border-0"
       onclick="selectClient({{ client.pk }}, '{{ client.full_name }}', '{{ client.phone }}')">
    <div class="font-medium text-sm text-gray-900">{{ client.full_name }}</div>
    <div class="text-xs text-gray-500 flex gap-2">
      <span>{{ client.phone }}</span>
      {% for p in client.patients.all %}
        <span class="text-gray-400">· {{ p.name }}</span>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
{% elif q %}
  <div class="px-4 py-3 text-sm text-gray-400">Нічого не знайдено</div>
{% endif %}
